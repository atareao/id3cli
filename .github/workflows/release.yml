name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare archive
        run: |
          BIN="target/x86_64-unknown-linux-gnu/release/id3cli"
          ARCHIVE_NAME="id3cli-linux-x86_64"
          cp "$BIN" "$ARCHIVE_NAME"
          PKG="id3cli-x86_64-unknown-linux-gnu"
          tar czf "$PKG.tar.gz" "$ARCHIVE_NAME"
          sha256sum "$PKG.tar.gz" > "$PKG.tar.gz.sha256"
          echo "ARCHIVE=$PKG.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM=$PKG.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: id3cli-linux
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.CHECKSUM }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: id3cli-linux

      - name: Generate release body
        run: |
          cat > notes.md <<'EOF'
          ## id3cli

          ### Downloads

          | Architecture | File |
          |---|---|
          EOF
          for f in *.*; do
            [[ "$f" == *.md ]] && continue
            [[ "$f" == *.sha256 ]] && continue
            [ -f "$f" ] || continue
            arch=$(echo "$f" | sed 's/^id3cli-//; s/\.tar\.gz$//')
            echo "| \`$arch\` | \`$f\` |" >> notes.md
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: id3cli ${{ github.ref_name }}
          body_path: notes.md
          files: |
            *.tar.gz
            *.sha256
          generate_release_notes: true

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty